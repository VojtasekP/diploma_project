program: src/train.py
method: random

metric:
  goal: maximize
  name: val_DetA

run_cap: 200

early_terminate:
  type: hyperband
  min_iter: 50
  eta: 2

parameters:
  # --- training ---
  seed:
    value: 0
  lr:
    distribution: log_uniform_values
    min: 5e-5
    max: 5e-3
  wd:
    distribution: log_uniform_values
    min: 1e-4
    max: 0.2
  epochs:
    value: 300
  batch_size:
    value: 16
  dice_weight:
    value: 0
  dataset_length:
    value: 1600
  early_stop_patience:
    value: 50
  burn_in:
    value: 0
  val_every:
    value: 2
  run_test:
    value: false

  # --- fixed architecture ---
  model:
    value: equiunet
  depth:
    value: 3
  start_filters:
    value: 16
  max_rot_order:
    values: [1, 2, 3]
  group_order:
    value: -1
  fourier_function:
    value: p_relu

  # --- swept hparams ---
  # fourier_N is ignored when activation_type=gated
  activation_type:
    value: fourierbn
  fourier_N:
    values: [8, 16, 24]
  kernel_size:
    values: [3, 5]
  conv_sigma:
    distribution: uniform
    min: 0.4
    max: 1.2
